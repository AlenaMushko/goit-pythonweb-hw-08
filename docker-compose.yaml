services:
  postgres:
    image: postgres:16-alpine
    restart: always
    container_name: ${POSTGRES_CONTAINER_NAME:-hw08-postgres}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-hw08}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ${APP_CONTAINER_NAME:-hw08-app-container}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:8000"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-hw08}
    volumes:
      - .:/hw08-app-container

volumes:
  postgres_data: